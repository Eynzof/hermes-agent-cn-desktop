# Build hermes-cn-desktop-v2 installers and attach them to a GitHub
# Release. Triggers on tags matching `v*` (e.g. `v0.1.0`).
#
# Cross-platform build runs in parallel (windows-latest, macos-14 arm64,
# ubuntu-latest). Each job:
#   1. Installs Node + pnpm + Rust toolchain
#   2. Caches cargo registry and target dir
#   3. `pnpm install`
#   4. Builds the Tauri release bundle. The HERMES_RUNTIME_UPDATE_*_DEFAULT
#      env vars are NOT set here — src/process/runtime.rs ships hardcoded
#      production fallbacks. Set them only if you fork the project and
#      want to point the auto-update at a different runtime release
#      pipeline.
#   5. tauri-action uploads .msi / .dmg / .AppImage to the GitHub Release
#      it creates on first run, or appends to an existing tag's release.

name: release-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to associate the build with (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # WebkitGTK is the webview backend on Linux. libgtk + libayatana
          # are required by tauri-plugin-shell and the dialog plugin.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v3
        with:
          version: "9"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          # The Tauri sub-crate uses the project root as the manifest dir.
          workspaces: ". -> target"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build + upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tauri-action looks up the tag from this input. On a push:tags
          # trigger it falls back to GITHUB_REF, but we pass it explicitly
          # so workflow_dispatch also works.
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Hermes Agent CN ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Auto-built desktop installer.
            Runtime is downloaded on first launch from
            https://github.com/Eynzof/hermes-agent-cn/releases/latest/download
            (overridable via HERMES_RUNTIME_UPDATE_* env vars).
          releaseDraft: false
          # Don't mark stable releases as prerelease; only -beta/-rc tags
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          args: --target ${{ matrix.target }}
