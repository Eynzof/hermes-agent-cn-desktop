# Build hermes-cn-desktop-v2 installers and attach them to a GitHub
# Release. Triggers on tags matching `v*` (e.g. `v0.1.0`).
#
# Desktop release build runs in parallel for Windows and macOS. Each job:
#   1. Installs Node + pnpm + Rust toolchain
#   2. Caches cargo registry and target dir
#   3. `pnpm install`
#   4. Stages the bundled dashboard frontend + bundled skills. Windows also
#      stages the bundled hermes-agent-cn runtime zip + manifest.
#   5. Builds the Tauri release bundle. The HERMES_RUNTIME_UPDATE_*_DEFAULT
#      env vars are NOT set here; src/process/runtime.rs ships hardcoded
#      production fallbacks. Set them only if you fork the project and
#      want to point the auto-update at a different runtime release
#      pipeline.
#   6. tauri-action uploads .exe / .dmg to the GitHub Release
#      it creates on first run, or appends to an existing tag's release.

name: release-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to associate the build with (e.g. v0.1.0)"
        required: true
      bundled_runtime_tag:
        description: "hermes-agent-cn runtime release tag to embed in Windows installer, or latest"
        default: "latest"
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v3
        with:
          version: "9"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          # The Tauri sub-crate uses the project root as the manifest dir.
          workspaces: ". -> target"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Resolve bundled runtime manifest
        id: runtime_manifest
        shell: bash
        env:
          BUNDLED_RUNTIME_TAG: ${{ github.event.inputs.bundled_runtime_tag || 'latest' }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          (async () => {
            const tag = process.env.BUNDLED_RUNTIME_TAG || "latest";
            const baseUrl = tag === "latest"
              ? "https://github.com/Eynzof/hermes-agent-cn/releases/latest/download"
              : `https://github.com/Eynzof/hermes-agent-cn/releases/download/${encodeURIComponent(tag)}`;
            const response = await fetch(`${baseUrl}/stable-win32-x64.json`, {
              headers: { "User-Agent": "hermes-cn-desktop-v2-release-workflow" },
            });
            if (!response.ok) {
              throw new Error(`manifest download failed: HTTP ${response.status}`);
            }
            const manifest = await response.json();
            if (!manifest.sourceCommit) {
              throw new Error("runtime manifest missing sourceCommit");
            }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `source_commit=${manifest.sourceCommit}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `runtime_version=${manifest.runtimeVersion}\n`);
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE

      - name: Checkout hermes-agent-cn source for dashboard assets
        uses: actions/checkout@v4
        with:
          repository: Eynzof/hermes-agent-cn
          ref: ${{ steps.runtime_manifest.outputs.source_commit }}
          path: hermes-agent-cn-source

      - name: Stage bundled dashboard frontend
        run: node scripts/stage-dashboard-web-dist.mjs --source hermes-agent-cn-source

      - name: Stage bundled skills
        run: node scripts/stage-bundled-skills.mjs --source hermes-agent-cn-source

      - name: Stage bundled hermes-agent-cn runtime
        if: matrix.runner == 'windows-latest'
        run: node scripts/stage-bundled-runtime.mjs --tag "${{ github.event.inputs.bundled_runtime_tag || 'latest' }}" --platform win32 --arch x64

      - name: Build + upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tauri-action looks up the tag from this input. On a push:tags
          # trigger it falls back to GITHUB_REF, but we pass it explicitly
          # so workflow_dispatch also works.
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Hermes Agent 中文社区桌面版 ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            自动构建的 Hermes Agent 中文社区桌面版安装包。

            安装包已内置来自 hermes-agent-cn
            ${{ steps.runtime_manifest.outputs.source_commit }} 的 Dashboard 前端和内置技能。

            Windows 安装包同时内置 hermes-agent-cn runtime
            ${{ steps.runtime_manifest.outputs.runtime_version }}，安装后可直接启动本地内核。

            macOS 会在首次启动时从以下地址下载 runtime：
            https://github.com/Eynzof/hermes-agent-cn/releases/latest/download

            如需覆盖 runtime 更新源，可设置 HERMES_RUNTIME_UPDATE_* 环境变量。
          releaseDraft: false
          # Don't mark stable releases as prerelease; only -beta/-rc tags
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          args: --target ${{ matrix.target }}
